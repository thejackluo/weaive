name: Mobile Lint

on:
  push:
    branches: [main]
    paths:
      - 'weave-mobile/**'
      - '.github/workflows/mobile-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'weave-mobile/**'

jobs:
  lint:
    name: ESLint (Mobile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weave-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: weave-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
